name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Font Awesome Pro
        run: |
          echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ secrets.FONTAWESOME_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets into wrangler config
        run: |
          node -e "
            const fs = require('fs');
            const jsonc = fs.readFileSync('wrangler.jsonc', 'utf8');
            const json = jsonc.replace(/,(\s*[}\]])/g, '\$1');
            const config = JSON.parse(json);
            config.env.staging.vars = {
              ...config.env.staging.vars,
              AUTH_SECRET: process.env.AUTH_SECRET,
              ENGINE_API_KEY: process.env.ENGINE_API_KEY,
              GOOGLE_CLIENT_ID: process.env.GOOGLE_CLIENT_ID || '',
              GOOGLE_CLIENT_SECRET: process.env.GOOGLE_CLIENT_SECRET || ''
            };
            fs.writeFileSync('wrangler.jsonc', JSON.stringify(config, null, 2));
          "
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ENGINE_API_KEY: ${{ secrets.ENGINE_API_KEY_STAGING }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build

      - name: Deploy to Staging
        run: npx opennextjs-cloudflare deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
